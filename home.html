<!DOCTYPE html>
<html>
<head>

<title>Toy Store</title>

<style>

body{

background:#f2f2f2;

}

header{

color:white;
padding:20px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
box-shadow:0px 0px 10px gray;
text-align:center;
width:220px;
}

img{
width:180px;
height:180px;
}

button{
background:green;
color:white;
padding:10px;
border:none;
}

</style>

</head>

<body>

<header>

<h1>Toy Stores</h1>

<p>Children Toys & Educational Games</p>

</header>

<div class="container">

<div class="card">

<img src="https://via.placeholder.com/180">

<h3>Teddy Bear</h3>

<p>₹500</p>

<button>Buy Now</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/180">

<h3>Building Blocks</h3>

<p>₹700</p>

<button>Buy Now</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/180">

<h3>Educational Puzzle</h3>

<p>₹650</p>

<button>Buy Now</button>

</div>

</div>

</body>
</html>
